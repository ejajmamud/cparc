[start]
cmd = "node /assets/scripts/prestart.mjs /assets/nginx.template.conf /nginx.conf && grep -q client_max_body_size /nginx.conf || sed -i '/sendfile/i\\    client_max_body_size 256M;' /nginx.conf && printf '\\nphp_admin_value[upload_max_filesize] = 128M\\nphp_admin_value[post_max_size] = 256M\\nphp_admin_value[memory_limit] = 256M\\nphp_admin_value[max_execution_time] = 300\\n' >> /assets/php-fpm.conf && (php-fpm -y /assets/php-fpm.conf & nginx -c /nginx.conf)"
